name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # 每次推送到 main 分支时自动触发
  workflow_dispatch:  # 允许手动从 Actions 页面触发

# 授予 GitHub Actions 写入 GitHub Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一个部署任务运行
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 安装 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. TypeScript 类型检查
      - name: Type check
        run: npx tsc --noEmit

      # 5. 生产构建
      - name: Build
        run: npm run build

      # 6. 配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 7. 上传构建产物
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      # 8. 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
